pcbs:
  chaski:
    template: kicad8
    outlines:
      main:
        outline: pcb_outline
    params:
      name: *keyboard_name
      paper: A4

    footprints:
      hotswap_sockets:
        what: choc-v1-v2
        where: [opt_switch, switch]
        params:
          from: "{{kcol}}"
          to: "{{colrow}}"
          include_keycap: true
          include_corner_marks: true

      keyboard_matrix_map:
        what: text
        where: [opt_switch, switch]
        adjust:
          shift: [-3/5 hdx, hdy / 3]
          resist: true
        params:
          side: B
          text: "{{kcol}}-{{krow}}"

      diodes:
        what: sod123
        where: [opt_switch, switch]
        adjust:
          shift: [0, -4]
          resist: true
        params:
          side: B
          designator: SW
          from: "{{colrow}}"
          to: "{{krow}}"
          smd: true
          via: padto
          labels: true

      xiao_mcu:
        what: xiao
        where: mcu
        params:
          side: B
          orientation: down
          VUSB: none
          VCC: none
          vias: false

      xiao_note:
        what: text
        where: mcu
        adjust.shift: [0, -12]
        params:
          side: B
          text: XIAO BLE FACE DOWN

      xiao_bat_pos:
        what: pad
        where: xiao_pos_pad
        params:
          text_side: B
          net: BAT+
          text: BAT+
          shape: circle
          align: down
          width: 2
          height: 2

      xiao_reset:
        what: pad
        where: reset_pad
        params:
          text_side: B
          net: RST
          text: RST
          shape: circle
          align: down
          width: 2
          height: 2

      nfc_pads:
        what: pad
        where: nfc_pad
        params:
          text_side: B
          net: "{{kcol}}"
          text: "{{kcol}}"
          shape: circle
          align: down
          width: 2
          height: 2

      battery_jst:
        what: jst-ph-2
        where: jst
        params:
          BAT_P: RAW
          BAT_N: GND

      reset_button:
        what: reset-smd-top
        where: reset
        params:
          side: B
          from: GND
          to: RST

      reset_note:
        what: text
        where: reset
        adjust:
          shift: [-9, 0]
        params:
          side: B
          text: RESET
          justify: left

      power_slider:
        what: trislider
        where: power
        params:
          side: B
          posts: true
          vias: true
          COM: RAW
          A: BAT+

      power_label:
        what: text
        where: power
        adjust.shift: [-4.5, 0.6]
        params:
          side: B
          text: POWER
          justify: right

      power_on:
        what: text
        where: power
        adjust.shift: [-4.5, -0.8]
        params:
          side: B
          text: ON
          justify: right

      power_off:
        what: text
        where: power
        adjust.shift: [4.5, 0.6]
        params:
          side: B
          text: OFF
          justify: left

      mounting_holes:
        what: mountinghole
        where: screw

      screw_holes:
        what: screwhole
        where: top_screw

      board_logo:
        what: patagona
        where: battery
        adjust.shift: [0, 5]
        params:
          side: F

      keyboard_genus:
        what: text
        where: battery
        adjust.shift: [0, -22]
        params:
          side: F
          text: *keyboard_genus
          layer: Cu
          size: 3
          thickness: 0.5

      keyboard_species:
        what: text
        where: battery
        adjust.shift: [0, -27]
        params:
          side: F
          text: *keyboard_species
          layer: Cu
          size: 3
          thickness: 0.5

      board_version:
        what: text
        where: battery
        adjust.shift: [0, -33]
        params:
          text: *version
          side: F

      board_repo:
        what: text
        where: battery
        adjust.shift: [0, -31]
        params:
          side: F
          text: *repo

      license_note_over:
        what: text
        where: middle_top_screw
        adjust:
          shift: [0, 5.5]
          orient: 22.5
        params:
          side: F
          text: Licensed under

      license_note_under:
        what: text
        where: middle_top_screw
        adjust:
          shift: [0, -9]
          orient: 22.5
        params:
          side: F
          text: *license

      license_logo:
        what: oshw
        where: middle_top_screw
        adjust:
          shift: [-0.01, -1.55]
          orient: 22.5
        params:
          side: F

      order_number:
        what: text
        where: battery
        adjust.shift: [0, hdy - 2.75]
        params:
          side: F
          text: *order_text
