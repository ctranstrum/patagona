meta:
  keyboard: &keyboard_name Patagona gigas
  author: chad@transtrum.net
  version: &version v1.0
  repository: &repo https://github.com/ctranstrum/patagona
  license: &license Licensed under CERN-OHL-P v2

  # Depending on where you are ordering from, uncomment or edit one of these:
  # order_num_template: &order_text JLCJLCJLCJLC # for ordering from JLCpcb.com
  # order_num_template: &order_text WayWayWay    # for ordering from PCBway.com
  order_num_template: &order_text "" # remove the order number text completely

units:
  dx: u
  dy: u

  hdx: dx / 2
  hdy: dy / 2

  # easily change the thicknesses of different parts of the case
  bottom_case_height: 3
  top_case_height: 2.2
  battery_cover_height: 7

  mirrored_distance: 1.75 dx

points:
  zones:
    matrix:
      # Shift the PCB down and to the right to get it on the sheet in kicad
      anchor.shift: [50, -100]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance
      key:
        autobind: .5
        tags: [switch]
      columns:
        pinky:
          key:
            col: D0
            splay: -10
            mirror.col: D10
          rows:
            bottom:
              row: D5
              # bind: [0, 45, 0, 0]
              tags: [switch, low_bumper]
            home:
              row: D4
            top:
              orient: -5
              shift: [3, 3]
              row: D3
              tags: [switch, high_bumper]
              bind: [0, 4]
        ring:
          key:
            stagger: 2/3 dx
            spread: 1.05 dx
            splay: -5
            col: D0
            mirror.col: D10
          rows:
            bottom:
              row: D8
            home:
              row: D7
            top:
              row: D6
              bind: [1, 0]
        middle:
          key:
            stagger: hdx
            spread: 1.04 dx
            splay: -5
            col: D1
            mirror.col: D9
          rows:
            bottom:
              row: D5
            home:
              row: D4
            top:
              row: D3
              tags: [switch, mid_bumper]
              bind: [0, 1]
        index:
          key:
            stagger: -hdx
            splay: -2.5
            col: D1
            mirror.col: D9
          rows:
            bottom:
              row: D8
            home:
              row: D7
            top:
              row: D6
        inner:
          key:
            stagger: 2/3 hdx
            col: D2
          rows:
            bottom:
              row: D4
              mirror.row: D7
            home:
              row: D3
              mirror.row: D6

    thumbs:
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance
      anchor:
        ref: matrix_inner_bottom
        shift: [0, -dy - 3]
      key:
        bind: [15, 0, 0, 0]
      columns:
        inner.rows.spot:
          splay: -15
          col: NFC1
          row: D5
          mirror.row: D8
          tags: [opt_switch, low_bumper]
        outer.rows.spot:
          col: D2
          row: D5
          mirror.row: D8
          tags: [switch]

    dpad:
      anchor:
        aggregate.parts: [thumbs_outer_spot, mirror_thumbs_outer_spot]
        shift: [0, 1.05 dy]
      key:
        tags: [dpad]
        col: NFC2
        cpdst: CP1
        bind: [25, 4.3, 0, 4.3]

    mcu:
      key.tags: [mcu]
      anchor:
        # top middle left
        aggregate.parts: [matrix_middle_top, mirror_matrix_middle_top]
        shift: [-6, 2.65]

    power:
      key.tags: [power]
      anchor:
        aggregate.parts: [matrix_middle_top, mirror_matrix_middle_top]
        shift: [20, 11]

    reset:
      key.tags: [reset]
      anchor:
        ref: power
        shift: [0, -hdy]

    battery:
      key.tags: [battery]
      anchor:
        aggregate.parts: [matrix_middle_top, mirror_matrix_middle_top]
        shift: [0, -7.5]

    thumb_bumper:
      key.tags: [bumper, rect_bumper]
      anchor:
        ref: dpad
        shift: [0, -1.85 dy]

    center_bumper:
      key.tags: [bumper, rect_bumper]
      anchor:
        ref: dpad
        shift: [0, 1.3 dy]

    rectangle_top_bumper:
      key.tags: [rect_bumper]
      anchor:
        ref: matrix_pinky_top
        shift: [-2.2 hdx, hdy - 1]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    rectangle_bottom_bumper:
      key.tags: [rect_bumper]
      anchor:
        ref: matrix_pinky_bottom
        shift: [-0.2 hdx, -3.6 hdy]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    pinky_home_screw:
      key.tags: [screw]
      anchor:
        ref: matrix_pinky_home
        shift: [-2, hdy + 1.6]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    pinky_low_screw:
      key.tags: [screw]
      anchor:
        ref: matrix_pinky_bottom
        shift: [0, -hdy]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    pinky_high_screw:
      key.tags: [screw]
      anchor:
        ref: matrix_ring_top
        shift: [hdx + 2, hdy - 2]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    middle_top_screw:
      key.tags: [top_screw]
      anchor:
        ref: matrix_middle_top
        shift: [4, hdy + 3.25]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    thumb_screw:
      key.tags: [screw]
      anchor:
        ref: thumbs_inner_spot
        shift: [-hdx - 1, hdy]
      mirror:
        ref: matrix_inner_home
        distance: mirrored_distance

    center_screw:
      key.tags: [top_screw]
      anchor:
        ref: dpad
        shift: [0, 2 dy]

    center_bottom_screw:
      key.tags: [screw, rect_screw]
      anchor:
        ref: dpad
        shift: [0, -1.5 dy]

    pad_xiao_pos:
      key.tags: [pad_circle, xiao_pos_pad]
      anchor:
        ref: mcu
        shift: [-4, -16]

    pad_reset:
      key.tags: [pad_circle, reset_pad]
      anchor:
        ref: mcu
        shift: [4, -16]

    pad_nfc2:
      anchor:
        ref: pad_reset
        shift: [4, 0]
      key:
        tags: [pad_circle, nfc_pad]
        col: NFC2

    pad_nfc1:
      anchor:
        ref: pad_nfc2
        shift: [4, 0]
      key:
        tags: [pad_circle, nfc_pad]
        col: NFC1

    jst:
      key.tags: [jst]
      anchor:
        ref: reset
        shift: [7, 0]
        rotate: -90

outlines:
  _central_bridge:
    - what: rectangle
      where.aggregate.parts: [matrix_middle_home, mirror_matrix_middle_home]
      size: [99, 62.4]

  _key_area:
    - what: rectangle
      size: u + 4
      corner: 5

  _keys_surround:
    - what: outline
      name: _key_area
      where: [opt_switch, switch]
    - what: outline
      name: _key_area
      where.ref: matrix_pinky_home
      adjust.shift: [0, -hdx]
    - what: outline
      name: _key_area
      where.ref: mirror_matrix_pinky_home
      adjust.shift: [0, -hdx]
    - what: outline
      name: _key_area
      where.ref: thumbs_inner_spot
      adjust.shift: [hdx, 0]
    - what: outline
      name: _key_area
      where.ref: mirror_thumbs_inner_spot
      adjust.shift: [hdx, 0]
    - what: outline
      name: _key_area
      where.ref: matrix_index_bottom
      adjust.shift: [hdx, 0]
    - what: outline
      name: _key_area
      where.ref: mirror_matrix_index_bottom
      adjust.shift: [hdx, 0]
    - what: outline
      name: _key_area
      where.ref: matrix_ring_top
      adjust.shift: [hdx, 0]
    - what: outline
      name: _key_area
      where.ref: mirror_matrix_ring_top
      adjust.shift: [hdx, 0]

  _bottom_curve:
    - what: circle
      where: dpad
      radius: 30
      adjust.shift: [0, -9.95]

  outline_shapes_builder:
    - _central_bridge
    - ^_keys_surround
    - ^_bottom_curve

  board_outline:
    - _central_bridge
    - _bottom_curve
    - what: outline
      name: _keys_surround

  _board_outline_padding:
    - what: outline
      name: board_outline
      expand: 0.25

  _rectangle_outline:
    - what: rectangle
      where:
        aggregate.parts: [matrix_index_home, mirror_matrix_index_home]
      size: [230, 97.4]
      adjust.shift: [0, -5]
      corner: 5

  rectangle_case_outline:
    - board_outline
    - what: outline
      name: _rectangle_outline
      fillet: 15

  _rectangle_snap1:
    - what: outline
      name: _rectangle_outline
      expand: -1
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap2:
    - what: outline
      name: _rectangle_outline
      expand: -1.05
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap3:
    - what: outline
      name: _rectangle_outline
      expand: -1.1
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap4:
    - what: outline
      name: _rectangle_outline
      expand: -1.15
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap5:
    - what: outline
      name: _rectangle_outline
      expand: -1.2
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap6:
    - what: outline
      name: _rectangle_outline
      expand: -1.25
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap7:
    - what: outline
      name: _rectangle_outline
      expand: -1.3
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_snap8:
    - what: outline
      name: _rectangle_outline
      expand: -1.35
    - what: outline
      name: board_outline
      fillet: 10

  _rectangle_clip1:
    - rectangle_case_outline
    - -_board_outline_padding
    - -_rectangle_snap1

  _rectangle_clip2:
    - rectangle_case_outline
    - -_board_outline_padding
    - -_rectangle_snap2

  _rectangle_clip3:
    - rectangle_case_outline
    - -_board_outline_padding
    - -_rectangle_snap3

  _rectangle_clip4:
    - rectangle_case_outline
    - -_board_outline_padding
    - -_rectangle_snap4

  _rectangle_clip5:
    - rectangle_case_outline
    - -_board_outline_padding
    - -_rectangle_snap5

  _rectangle_case_fill:
    - rectangle_case_outline
    - -_board_outline_padding

  _xiao_visualizer:
    - what: rectangle
      where: mcu
      size: [17.8, 21]
      corner: 2
    - what: rectangle
      where: mcu
      size: [8, 2]
      adjust.shift: [0, 11.5]

  _xiao_usb_cutout:
    - what: rectangle
      where: mcu
      size: [9.5, 8.5]
      adjust.shift: [0, 8.25]

  _xiao_light_guide:
    # in theory this should be 1.75mm diameter
    # but for FDM prints, I find I need more room
    - what: circle
      where: mcu
      radius: 1.05
      adjust.shift: [6, 7.5]

  _xiao_cutout:
    - what: rectangle
      where: mcu
      size: [14, 23]
      adjust.shift: [0, 1]
      corner: 1
    - _xiao_usb_cutout

  _xiao_bottom_cutout:
    - what: rectangle
      where: mcu
      size: [14, 25]
      adjust.shift: [0, -4]

  _xiao_cutout_wall:
    - what: rectangle
      where: mcu
      size: [19, 21.5]
      corner: 1

      # Make some room for the solder
  _xiao_cutout_solder:
    - what: rectangle
      where: mcu
      size: [19, 18]
      corner: 1

  _xiao_chip:
    - what: rectangle
      where: mcu
      size: [13, 12]
      adjust.shift: [0, -2]

  _power_pcb_holes:
    - what: circle
      where: power
      radius: 0.45
      adjust.shift: [-1.5, 0]
    - what: circle
      where: power
      radius: 0.45
      adjust.shift: [1.5, 0]

  _power_visualizer:
    - what: rectangle
      where: power
      size: [8, 3.9]
    - what: rectangle
      where: power
      size: 1.3
      adjust.shift: [1.5, 2.6]
    - -_power_pcb_holes

  _power_cutout:
    - what: rectangle
      where: power
      size: [9, 4.7]
      adjust.shift: [0, -0.2]

  _reset_outline:
    - what: polygon
      points:
        - ref: reset
          shift: [2.6, 1.5]
        - ref: reset
          shift: [1.5, 2.6]
        - ref: reset
          shift: [-1.5, 2.6]
        - ref: reset
          shift: [-2.6, 1.5]
        - ref: reset
          shift: [-2.6, -1.5]
        - ref: reset
          shift: [-1.5, -2.6]
        - ref: reset
          shift: [1.5, -2.6]
        - ref: reset
          shift: [2.6, -1.5]
    - what: rectangle
      size: [6.4, 0.5]
      where: reset
      adjust.shift: [0, -1.85]
    - what: rectangle
      where: reset
      size: [6.4, 0.5]
      adjust.shift: [0, 1.85]

  _reset_button:
    - what: circle
      where: reset
      radius: 1

  _reset_button_cutout_smallest:
    - what: circle
      where: reset
      radius: 1.3

  _reset_button_cutout_small:
    - what: circle
      where: reset
      radius: 1.6

  _reset_button_cutout_medium:
    - what: circle
      where: reset
      radius: 1.9

  _reset_button_cutout_large:
    - what: circle
      where: reset
      radius: 2.1

  _reset_visualizer:
    - _reset_outline
    - ^_reset_button

  _reset_cutout:
    - what: rectangle
      where: reset
      size: [9, 6]
      corner: 1

  _reset_post:
    - what: circle
      where: reset
      radius: 1.1

  _battery_cutout:
    - what: rectangle
      where: battery
      size: [28, 33]
      corner: 1

  _jst_cutout:
    - what: rectangle
      where: jst
      size: 8
      adjust.shift: [0, -2]
      corner: 1
    - what: rectangle
      where: jst
      size: [12, 16]
      adjust.shift: [0, -12]
      corner: 3
    - what: rectangle
      where: jst
      size: [6, 30]
      adjust.shift: [0, -13]
      corner: 2

  _jst_pcb_holes:
    - what: circle
      where: jst
      radius: 0.4
      adjust.shift: [1, 0]
    - what: circle
      where: jst
      radius: 0.4
      adjust.shift: [-1, 0]

  _jst_tht_cutout:
    - what: outline
      name: _jst_pcb_holes
      expand: 1

  _keycap:
    - what: rectangle
      size: 18
      corner: 1

  _keycaps:
    - what: outline
      name: _keycap
      where: [opt_switch, switch]

  top_down_view:
    - board_outline
    - _xiao_visualizer
    - _power_visualizer
    - _reset_visualizer
    - -_keycaps
    - -_xiao_light_guide

  rectangle_top_down_view:
    - rectangle_case_outline
    - _xiao_visualizer
    - _power_visualizer
    - _reset_visualizer
    - -_keycaps
    - -_xiao_light_guide

  _dpad_plate_cutout:
    - what: rectangle
      where: dpad
      size: [12.4, 13.2]
    - what: rectangle
      where: dpad
      size: [6.1, 1.2]
      adjust.shift: [0, -7.2]

  _dpad_plate_cutout_expanded:
    - what: outline
      name: _dpad_plate_cutout
      expand: 1

  _diode:
    - what: rectangle
      size: [2.7, 1.65]
    - what: rectangle
      size: [3.9, 0.6]

  _diodes:
    - what: outline
      name: _diode
      where: [opt_switch, switch]
      adjust:
        shift: [0, -4]
        resist: true
    - what: outline
      name: _diode
      where: dpad
      adjust.shift: [0, 14]

  _diodes_cutout:
    - what: rectangle
      where: [opt_switch, switch]
      size: [5.2, 2.2]
      adjust:
        shift: [0, -4]
        resist: true
    - what: rectangle
      where: dpad
      size: [5.2, 2.2]
      adjust.shift: [0, 14]

  _return_diodes:
    - what: outline
      name: _diode
      where: return
      adjust.shift: [0, -0.4 dy]
    - what: outline
      name: _diode
      where: return
      adjust.shift: [0, -0.55 dy]

  _return_diodes_cutout:
    - what: rectangle
      where: return
      size: 5.2
      adjust.shift: [0, -0.475 dy]

  _switch_cutout:
    - what: rectangle
      size: 14
      corner: 1

  _switch_clip:
    - what: rectangle
      size: [15, 14]
      corner: 1

  _switches_plate_cutout:
    - what: outline
      name: _switch_cutout
      where: switch
    - _dpad_plate_cutout

  _optional_left_switch_cutout:
    - what: outline
      name: _switch_cutout
      where: [[opt_switch, /^thumb/]]

  _optional_right_switch_cutout:
    - what: outline
      name: _switch_cutout
      where: [[opt_switch, /^mirror/]]

  _switches_clip_cutout:
    - what: outline
      name: _switch_clip
      where: switch

  _optional_left_clip_cutout:
    - what: outline
      name: _switch_clip
      where: [[opt_switch, /^thumb/]]

  _optional_right_clip_cutout:
    - what: outline
      name: _switch_clip
      where: [[opt_switch, /^mirror/]]

  _switches_swap_tool:
    - what: rectangle
      where: switch
      size: [3.5, 18.7]
      corner: 1

  _optional_left_swap_tool:
    - what: rectangle
      where: [[opt_switch, /^thumb/]]
      size: [3.5, 18.7]
      corner: 1

  _optional_right_swap_tool:
    - what: rectangle
      where: [[opt_switch, /^mirror/]]
      size: [3.5, 18.7]
      corner: 1

  _switch_holes:
    # these are created in the pcb software ...
    # but we need to create them manually for our mock pcb
    # ... also the radius has been rounded up for fdm printing ...
    - what: circle # center post
      radius: 2.5
    - what: circle # v1 left stabililzer
      radius: 0.9
      adjust.shift: [-5.5, 0]
    - what: circle # v1 right stabilizer
      radius: 0.9
      adjust.shift: [5.5, 0]
    - what: circle # v2 stabilizer
      radius: 0.8
      adjust.shift: [-5, -5.15]

  _switch_holes_placed:
    - what: outline
      name: _switch_holes
      where: [opt_switch, switch]
      adjust.resist: true

  _socket_post_holes:
    # center
    - what: circle
      radius: 1.6
      adjust.shift: [0, -5.95]
      # left (or rather, right on the opposite side of the board)
    - what: circle
      radius: 1.6
      adjust.shift: [-5, -3.75]

  _socket_pcb_holes:
    - what: outline
      name: _socket_post_holes
      where: [opt_switch, switch]
      adjust:
        rotate: 180
        resist: true

        # make a fairly accurate socket model
  _socket_outline:
    - what: rectangle
      adjust.shift: [0, -5.95]
      size: [4.75, 4.65]
      bevel: 1
    - what: rectangle
      adjust.shift: [-4.85, -3.8]
      size: [4.85, 4.65]
      fillet: 1
    - what: rectangle
      size: 2.6
      adjust.shift: [-2.4, -4.8]
    - what: rectangle
      adjust.shift: [-1.4, -2.5]
      size: 2.3
    - what: circle
      radius: 2.3
      adjust.shift: [-0.4, -1.35]
      operation: subtract
    - what: rectangle
      size: 2
      adjust.shift: [-2.375, -6.125]
    - what: circle
      radius: 1
      adjust.shift: [-3.375, -7.125]
      operation: subtract
    - what: rectangle
      size: [3.6, 1.7]
      adjust.shift: [2.375, -5.95]
    - what: rectangle
      size: [3.6, 1.7]
      adjust.shift: [-7.325, -3.8]
    - what: rectangle
      size: [2, 0.6]
      adjust.shift: [-6.5, -1.775]

  _socket_outlines:
    - what: outline
      name: _socket_outline
      where: [opt_switch, switch]
      adjust:
        rotate: 180
        resist: true

        # enlarge it a bit for wiggle room
  _socket_expanded:
    - what: outline
      name: _socket_outline
      expand: 0.75

      # then drop it under every key
  _socket_cutout:
    - what: outline
      name: _socket_expanded
      where: [opt_switch, switch]
      adjust:
        rotate: 180
        resist: true

  _socket_visualizer:
    - _switch_holes_placed
    - _socket_outlines

  _pad_cutout:
    - what: circle
      where: pad_circle
      radius: 1.5

  _screw_shaft:
    - what: circle
      where: [screw, top_screw]
      radius: 1.2

  _countersink1:
    - what: outline
      name: _screw_shaft
      expand: 1

  _countersink2:
    - what: outline
      name: _screw_shaft
      expand: 0.8

  _countersink3:
    - what: outline
      name: _screw_shaft
      expand: 0.6

  _countersink4:
    - what: outline
      name: _screw_shaft
      expand: 0.4

  _countersink5:
    - what: outline
      name: _screw_shaft
      expand: 0.2

  _rect_screw_shaft:
    - what: circle
      where: [rect_screw, top_screw]
      radius: 1.2

  _rect_countersink1:
    - what: outline
      name: _rect_screw_shaft
      expand: 1

  _rect_countersink2:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.8

  _rect_countersink3:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.6

  _rect_countersink4:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.4

  _rect_countersink5:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.2

  pcb_outline:
    - board_outline
    - -_xiao_cutout
    # - -_battery_cutout

  _hex_nut_angle:
    - what: rectangle
      size: [2.45, 4.25]

  _hex_nut:
    - _hex_nut_angle
    - what: outline
      name: _hex_nut_angle
      adjust.rotate: 60
    - what: outline
      name: _hex_nut_angle
      adjust.rotate: -60

  _hex_nuts:
    - what: outline
      name: _hex_nut
      where: screw

  _hex_nuts_wired:
    - _hex_nuts
    - what: outline
