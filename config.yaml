      where: low_bumper
      adjust.shift: [-7, -7]

  _mid_bumper:
    - what: outline
      name: _bumper
      where: mid_bumper
      adjust.shift: [12, 14]

  _high_bumper:
    - what: outline
      name: _bumper
      where: high_bumper
      adjust.shift: [-7, -2]

  _bumpers:
    - what: outline
      name: _bumper
      where: bumper

  _all_bumpers:
    - _low_bumper
    - _mid_bumper
    - _high_bumper
    - _bumpers

  _rect_bumpers:
    - _mid_bumper
    - what: outline
      name: _bumper
      where: rect_bumper

  top_plate:
    - board_outline
    - -_switches_plate_cutout
    - -_switches_swap_tool
    - -_xiao_light_guide
    - -_top_heat_set_passage
    - ^_pad_cutout
    - ^_switches_clip_cutout
    - -_dpad_plate_cutout
    - ^_battery_cutout
    - ^_jst_cutout
    - ^_xiao_usb_cutout
    - ^_xiao_chip
    - ^_hex_nuts

  rectangle_visualizer:
    - rectangle_case_outline
    - ^_rectangle_snap1
    - ^_rectangle_snap8
    - ^_rect_bumpers
    - ^_rect_countersink1

  _battery_cover_outline_poly:
    - what: polygon
      points:
        - ref: matrix_middle_top
          shift: [-dx, dy]
        - ref: matrix_middle_top
          shift: [-dx, hdy]
        - ref: matrix_middle_top
          shift: [hdx + 1, hdy + 1]
        - ref: matrix_middle_top
          shift: [hdx + 1, 1]
        - ref: matrix_index_top
          shift: [hdx + 1, hdy + 1]
        - ref: matrix_inner_home
          shift: [-hdx + 1, hdy + 1]
        - ref: matrix_inner_home
          shift: [hdx + 1, hdy + 1]

        - ref: mirror_matrix_inner_home
          shift: [hdx + 1, hdy + 1]
        - ref: mirror_matrix_inner_home
          shift: [-hdx + 1, hdy + 1]
        - ref: mirror_matrix_index_top
          shift: [hdx + 1, hdy + 1]
        - ref: mirror_matrix_middle_top
          shift: [hdx + 1, 1]
        - ref: mirror_matrix_middle_top
          shift: [hdx + 1, hdy + 1]
        - ref: mirror_matrix_middle_top
          shift: [-dx, hdy]
        - ref: mirror_matrix_middle_top
          shift: [-dx, dy]

  _battery_cover_outline:
    - board_outline
    - what: outline
      name: _battery_cover_outline_poly
      operation: intersect
      fillet: 2

  battery_cover_outline:
    - what: outline
      name: _battery_cover_outline
      fillet: 1

  _battery_cover_outline_1:
    - what: outline
      name: battery_cover_outline
      expand: -0.1

  _battery_cover_outline_2:
    - what: outline
      name: battery_cover_outline
      expand: -0.2

  _battery_cover_outline_3:
    - what: outline
      name: battery_cover_outline
      expand: -0.3

  _battery_cover_outline_4:
    - what: outline
      name: battery_cover_outline
      expand: -0.4

  _battery_cover_outline_5:
    - what: outline
      name: battery_cover_outline
      expand: -0.5

  _battery_cover_outline_6:
    - what: outline
      name: battery_cover_outline
      expand: -0.6

  _battery_cover_outline_7:
    - what: outline
      name: battery_cover_outline
      expand: -0.7

  _battery_cover_outline_8:
    - what: outline
      name: battery_cover_outline
      expand: -0.8

  _battery_cover_outline_9:
    - what: outline
      name: battery_cover_outline
      expand: -0.9

  component_visualization:
    - board_outline
    - ^_xiao_cutout
    - ^_switches_plate_cutout
    - ^_switches_swap_tool
    - ^_optional_left_swap_tool
    - ^_optional_right_swap_tool
    - ^_optional_left_switch_cutout
    - ^_optional_right_switch_cutout
    - ^_switches_clip_cutout
    - ^_optional_left_clip_cutout
    - ^_optional_right_clip_cutout
    - ^_socket_visualizer
    - ^_socket_pcb_holes
    - ^_keycaps
    - ^_xiao_visualizer
    - ^_xiao_light_guide
    - ^_power_visualizer
    - ^_power_cutout
    - ^_reset_visualizer
    - ^_reset_cutout
    - ^_jst_pcb_holes
    - ^_battery_cutout
    - ^_battery_cover_outline_1
    - ^_jst_cutout
    - ^_pad_cutout
    - ^_dpad_visualizer
    - ^_hex_nuts
    - ^_screw_shaft
    - ^_all_bumpers
    - ^_diodes
    - ^_diodes_cutout

  rectangle_component_visualization:
    - rectangle_case_outline
    - ^_xiao_cutout
    - ^_switches_plate_cutout
    - ^_switches_swap_tool
    - ^_optional_left_swap_tool
    - ^_optional_right_swap_tool
    - ^_optional_left_switch_cutout
    - ^_optional_right_switch_cutout
    - ^_switches_clip_cutout
    - ^_optional_left_clip_cutout
    - ^_optional_right_clip_cutout
    - ^_socket_visualizer
    - ^_socket_pcb_holes
    - ^_keycaps
    - ^_xiao_visualizer
    - ^_xiao_light_guide
    - ^_power_visualizer
    - ^_power_cutout
    - ^_reset_visualizer
    - ^_reset_cutout
    - ^_jst_pcb_holes
    - ^_battery_cutout
    - ^_battery_cover_outline_1
    - ^_jst_cutout
    - ^_pad_cutout
    - ^_dpad_visualizer
    - ^_rect_hex_nuts
    - ^_screw_shaft
    - ^_rect_bumpers
    - ^_diodes
    - ^_diodes_cutout

  _dovetail_outline_poly:
    - what: polygon
      points:
        - ref: matrix_middle_top
          shift: [hdx, 2dy]
        - ref: matrix_middle_top
          shift: [hdx, 0]
        - ref: matrix_index_top
          shift: [hdx, hdy]
        - ref: matrix_inner_home
          shift: [-hdx, hdy]
        - ref: matrix_inner_home
          shift: [hdx, hdy]

        - ref: matrix_inner_bottom
          shift: [hdx, -hdy]
        - ref: thumbs_outer_spot
          shift: [-hdx, hdy]
        - ref: thumbs_outer_spot
          shift: [hdx, hdy]
        - ref: thumbs_outer_spot
          shift: [hdx, -2dy]

        - ref: mirror_thumbs_outer_spot
          shift: [hdx, -2dy]
        - ref: mirror_thumbs_outer_spot
          shift: [hdx, hdy]
        - ref: mirror_thumbs_outer_spot
          shift: [-hdx, hdy]
        - ref: mirror_matrix_inner_bottom
          shift: [hdx, -hdy]

        - ref: mirror_matrix_inner_home
          shift: [hdx, hdy]
        - ref: mirror_matrix_inner_home
          shift: [-hdx, hdy]
        - ref: mirror_matrix_index_top
          shift: [hdx, hdy]
        - ref: mirror_matrix_middle_top
          shift: [hdx, 0]
        - ref: mirror_matrix_middle_top
          shift: [hdx, 2dy]

  dovetail:
    - board_outline
    - ~_dovetail_outline_poly

  _dovetail_1:
    - what: outline
      name: dovetail
      expand: 0.2
    - ~board_outline

  _dovetail_2:
    - what: outline
      name: dovetail
      expand: 0.4
    - ~board_outline

  _dovetail_3:
    - what: outline
      name: dovetail
      expand: 0.6
    - ~board_outline

  _dovetail_4:
    - what: outline
      name: dovetail
      expand: 0.8
    - ~board_outline

  _left_half:
    - what: rectangle
      where: matrix_middle_bottom
      size: [115, 150]
      adjust.rotate: 20

  _right_half:
    - what: rectangle
      where: mirror_matrix_middle_bottom
      size: [115, 150]
      adjust.rotate: 20

  dovetail_visualizer:
    - board_outline
    - -dovetail
    - ^_left_half
    - ^_right_half

cases:
  _countersunk_screw:
    - what: outline
      name: _countersink1
      extrude: 0.2
    - what: outline
      name: _countersink2
      extrude: 0.2
      shift: [0, 0, 0.2]
    - what: outline
      name: _countersink3
      extrude: 0.2
      shift: [0, 0, 0.4]
    - what: outline
      name: _countersink4
      extrude: 0.2
      shift: [0, 0, 0.6]
    - what: outline
      name: _countersink5
      extrude: 0.2
      shift: [0, 0, 0.8]
    - what: outline
      name: _screw_shaft
      extrude: bottom_case_height - 1
      shift: [0, 0, 1]

  _rect_countersunk_screw:
    - what: outline
      name: _rect_countersink1
      extrude: 0.2
    - what: outline
      name: _rect_countersink2
      extrude: 0.2
      shift: [0, 0, 0.2]
    - what: outline
      name: _rect_countersink3
      extrude: 0.2
      shift: [0, 0, 0.4]
    - what: outline
      name: _rect_countersink4
      extrude: 0.2
      shift: [0, 0, 0.6]
    - what: outline
      name: _rect_countersink5
      extrude: 0.2
      shift: [0, 0, 0.8]
    - what: outline
      name: _rect_screw_shaft
      extrude: bottom_case_height - 1
      shift: [0, 0, 1]

  _reset_bottom_cutout:
    - what: outline
      name: _reset_cutout
      extrude: 1.2
      shift: [0, 0, bottom_case_height - 1.2]
    - what: outline
      name: _reset_button_cutout_large
      extrude: 0.2
    - what: outline
      name: _reset_button_cutout_medium
      extrude: 0.2
      shift: [0, 0, 0.2]
    - what: outline
      name: _reset_button_cutout_small
      extrude: 0.2
      shift: [0, 0, 0.4]
    - what: outline
      name: _reset_button_cutout_smallest
      extrude: bottom_case_height - 1.8
      shift: [0, 0, 0.6]

  _bottom_cutouts:
    - what: outline
      name: _socket_cutout
      extrude: 2
      shift: [0, 0, bottom_case_height - 2]
    - what: outline
      name: _switch_holes_placed
      extrude: 1.8
      shift: [0, 0, bottom_case_height - 1.8]
    - what: outline
      name: _diodes_cutout
      extrude: 1.4
      shift: [0, 0, bottom_case_height - 1.4]
    - what: outline
      name: _xiao_bottom_cutout
      extrude: 2.5
      shift: [0, 0, bottom_case_height - 2.5]
    - what: outline
      name: _xiao_cutout_wall
      extrude: 1.2
      shift: [0, 0, bottom_case_height - 1.2]
    - what: outline
      name: _xiao_cutout_solder
      extrude: 0.5
      shift: [0, 0, bottom_case_height - 1.2 - 0.5]
    - what: outline
      name: _power_cutout
      extrude: 1.6
      shift: [0, 0, bottom_case_height - 1.6]
    - what: outline
      name: _jst_tht_cutout
      extrude: 1.6
      shift: [0, 0, bottom_case_height - 1.6]
    - _reset_bottom_cutout

  rectangle_bottom_case:
    - what: outline
      name: _rectangle_snap8
      extrude: 0.1
    - what: outline
      name: _rectangle_snap7
      extrude: 0.1
      shift: [0, 0, 0.1]
    - what: outline
      name: _rectangle_snap6
      extrude: 0.1
      shift: [0, 0, 0.2]
    - what: outline
      name: _rectangle_snap5
      extrude: 0.1
      shift: [0, 0, 0.3]
    - what: outline
      name: _rectangle_snap4
      extrude: 0.1
      shift: [0, 0, 0.4]
    - what: outline
      name: _rectangle_snap3
      extrude: bottom_case_height - 0.5
      shift: [0, 0, 0.5]
    - what: outline
      name: _rect_bumpers
      extrude: 1
      operation: subtract
    - -_bottom_cutouts
    - -_rect_countersunk_screw

  bottom_case:
    - what: outline
      name: board_outline
      extrude: bottom_case_height
    - what: outline
      name: _all_bumpers
      extrude: 1
      operation: subtract
    - -_bottom_cutouts
    - -_countersunk_screw

  _top_cutouts:
    - what: outline
      name: _xiao_light_guide
      extrude: top_case_height
    - what: outline
      name: _switches_plate_cutout
      extrude: top_case_height
    - what: outline
      name: _dpad_plate_cutout
      extrude: 1.2
    - what: outline
      name: _switches_clip_cutout
      extrude: top_case_height - 1.3
    - what: outline
      name: _switches_swap_tool
      extrude: 1
      shift: [0, 0, top_case_height - 1]
    - what: outline
      name: _xiao_usb_cutout
      extrude: 1.7
    - what: outline
      name: _xiao_chip
      extrude: 0.2
    - what: outline
      name: _pad_cutout
      extrude: 1
    - what: outline
      name: _top_heat_set_passage
      extrude: top_case_height
    - what: outline
      name: _jst_cutout
      extrude: top_case_height

  _shaped_top_cutouts:
    - _top_cutouts
    - what: outline
      name: _hex_nuts
      extrude: 1.8

  _rect_top_cutouts:
    - _top_cutouts
    - what: outline
      name: _rect_hex_nuts
      extrude: 1.8

  _top_left_cutouts:
    - what: outline
      name: _optional_left_switch_cutout
      extrude: top_case_height
    - what: outline
      name: _optional_left_clip_cutout
      extrude: top_case_height - 1.3
    - what: outline
      name: _optional_left_swap_tool
      extrude: 1
      shift: [0, 0, top_case_height - 1]

  _top_right_cutouts:
    - what: outline
      name: _optional_right_switch_cutout
      extrude: top_case_height
    - what: outline
      name: _optional_right_clip_cutout
      extrude: top_case_height - 1.3
    - what: outline
      name: _optional_right_swap_tool
      extrude: 1
      shift: [0, 0, top_case_height - 1]

  top_case_1_1:
    - what: outline
      name: board_outline
      extrude: top_case_height
    - -_shaped_top_cutouts

  top_case_1_2:
    - top_case_1_1
    - -_top_right_cutouts

  top_case_2_1:
    - top_case_1_1
    - -_top_left_cutouts

  top_case_2_2:
    - top_case_1_1
    - -_top_left_cutouts
    - -_top_right_cutouts

  _rectangle_top_case_1_1:
    - what: outline
      name: rectangle_case_outline
      extrude: top_case_height
    - -_rect_top_cutouts

  _rectangle_top_case_1_2:
    - _rectangle_top_case_1_1
    - -_top_right_cutouts

  _rectangle_top_case_2_1:
    - _rectangle_top_case_1_1
    - -_top_left_cutouts

  _rectangle_top_case_2_2:
    - _rectangle_top_case_1_1
    - -_top_left_cutouts
    - -_top_right_cutouts

  _rectangle_top_common:
    - what: outline
      name: _rectangle_case_fill
      extrude: 1.6
      shift: [0, 0, bottom_case_height]
    - what: outline
      name: _rectangle_clip1
      extrude: bottom_case_height - 0.4
      shift: [0, 0, 0.4]
    - what: outline
      name: _rectangle_clip2
      extrude: 0.1
      shift: [0, 0, 0.3]
    - what: outline
      name: _rectangle_clip3
      extrude: 0.1
      shift: [0, 0, 0.2]
    - what: outline
      name: _rectangle_clip4
      extrude: 0.1
      shift: [0, 0, 0.1]
    - what: outline
      name: _rectangle_clip5
      extrude: 0.1

  rectangle_top_case_1_1:
    - _rectangle_top_common
    - what: case
      name: _rectangle_top_case_1_1
      shift: [0, 0, 1.6 + bottom_case_height]

  rectangle_top_case_1_2:
    - _rectangle_top_common
    - what: case
      name: _rectangle_top_case_1_2
      shift: [0, 0, 1.6 + bottom_case_height]

  rectangle_top_case_2_1:
    - _rectangle_top_common
    - what: case
      name: _rectangle_top_case_2_1
      shift: [0, 0, 1.6 + bottom_case_height]

  rectangle_top_case_2_2:
    - _rectangle_top_common
    - what: case
      name: _rectangle_top_case_2_2
      shift: [0, 0, 1.6 + bottom_case_height]

  _top_dovetail:
    - what: outline
      name: dovetail
      extrude: top_case_height / 5
      shift: [0, 0, 4 * top_case_height / 5]
    - what: outline
      name: _dovetail_1
      extrude: top_case_height / 5
      shift: [0, 0, 3 * top_case_height / 5]
    - what: outline
      name: _dovetail_2
      extrude: top_case_height / 5
      shift: [0, 0, 2 * top_case_height / 5]
    - what: outline
      name: _dovetail_3
      extrude: top_case_height / 5
      shift: [0, 0, top_case_height / 5]
    - what: outline
      name: _dovetail_4
      extrude: top_case_height / 5

  top_dovetail:
    - _top_dovetail
    - -_top_cutouts

  _top_dovetail_sides_1:
    - top_case_1_1
    - -_top_dovetail

  _top_dovetail_sides_2:
    - top_case_2_2
    - -_top_dovetail

  _dovetail_right:
    - what: outline
      name: _right_half
      extrude: top_case_height

  _dovetail_left:
    - what: outline
      name: _left_half
      extrude: top_case_height

  top_dovetail_left_1:
    - _top_dovetail_sides_1
    - -_dovetail_right

  top_dovetail_right_1:
    - _top_dovetail_sides_1
    - -_dovetail_left

  top_dovetail_left_2:
    - _top_dovetail_sides_2
    - -_dovetail_right

  top_dovetail_right_2:
    - _top_dovetail_sides_2
    - -_dovetail_left

  battery_cover:
    - what: outline
      name: battery_cover_outline
      extrude: battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_1
      extrude: 2 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_2
      extrude: 3 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_3
      extrude: 4 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_4
      extrude: 5 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_5
      extrude: 6 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_6
      extrude: 7 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_7
      extrude: 8 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_8
      extrude: 9 * battery_cover_height / 10
    - what: outline
      name: _battery_cover_outline_9
      extrude: 10 * battery_cover_height / 10
    - what: outline
      name: _xiao_light_guide
      extrude: battery_cover_height
      operation: subtract
    - what: outline
      name: _battery_cutout
      extrude: battery_cover_height - 1
      operation: subtract
    - what: outline
      name: _jst_cutout
      extrude: 3
      operation: subtract
    - what: outline
      name: _top_heat_set
      extrude: 3
      operation: subtract
    - what: outline
      name: _top_heat_set_passage
      extrude: 1.5
      shift: [0, 0, 3]
      operation: subtract

  # Remove the underscore to print out the mock PCB if you want to check for fit
  mock_pcb:
    - what: outline
      name: pcb_outline
      extrude: 1.6
    - what: outline
      name: _switch_holes_placed
      extrude: 1.6
      operation: subtract
    - what: outline
      name: _socket_pcb_holes
      extrude: 1.6
      operation: subtract
    - what: outline
      name: _screw_shaft
      extrude: 1.6
      operation: subtract
    - what: outline
      name: _power_pcb_holes
      extrude: 1.6
      operation: subtract
    - what: outline
      name: _jst_pcb_holes
      extrude: 1.6
      operation: subtract
    - what: outline
      name: _pad_cutout
      extrude: 1.6
      operation: subtract

pcbs:
  gigas:
    template: kicad8
    outlines:
      main:
        outline: pcb_outline
    params:
      name: *keyboard_name
      paper: A4

    footprints:
      hotswap_sockets:
        what: choc-v1-v2
        where: [opt_switch, switch]
        params:
          from: "{{kcol}}"
          to: "{{colrow}}"
          include_keycap: true
          include_corner_marks: true

      keyboard_matrix_map:
        what: text
        where: [opt_switch, switch]
        adjust:
          shift: [-3/5 hdx, hdy / 3]
          resist: true
        params:
          side: B
          text: "{{kcol}}-{{krow}}"

      diodes:
        what: sod123
        where: [opt_switch, switch]
        adjust:
          shift: [0, -4]
          resist: true
        params:
          side: B
          designator: SW
          from: "{{colrow}}"
          to: "{{krow}}"
          smd: true
          via: padto
          labels: true

      dpad_matrix_map:
        what: text
        where: dpad_diode
        adjust.shift: [0, -2]
        params:
          side: B
          text: "{{kcol}}-{{krow}}"

      dpad_diodes:
        what: sod123
        where: dpad_diode
        params:
          side: B
          designator: SW
          from: "{{diode}}"
          to: "{{krow}}"
          smd: true
          via: pads
          labels: true

      dpad:
        what: skrh
        where: dpad
        adjust.rotate: -45
        params:
          A: dpad_a
          B: dpad_b
          C: dpad_c
          D: dpad_d
          CENTER: dpad_push
          COMMON: "{{kcol}}"

      xiao_mcu:
        what: xiao
        where: mcu
        params:
          side: B
          orientation: down
          VUSB: none
          VCC: none
          vias: false

      xiao_note:
        what: text
        where: mcu
        adjust.shift: [0, -12]
        params:
          side: B
          text: XIAO BLE FACE DOWN

      xiao_bat_pos:
        what: pad
        where: xiao_pos_pad
        params:
          text_side: B
          net: BAT+
          text: BAT+
          shape: circle
          align: down
          width: 2
          height: 2

      xiao_reset:
        what: pad
        where: reset_pad
        params:
          text_side: B
          net: RST
          text: RST
          shape: circle
          align: down
          width: 2
          height: 2

      nfc_pads:
        what: pad
        where: nfc_pad
        params:
          text_side: B
          net: "{{kcol}}"
          text: "{{kcol}}"
          shape: circle
          align: down
          width: 2
          height: 2

      battery_jst:
        what: jst-ph-2
        where: jst
        params:
          BAT_P: RAW
          BAT_N: GND

      reset_button:
        what: reset-smd-top
        where: reset
        params:
          side: B
          from: GND
          to: RST

      reset_note:
        what: text
        where: reset
        adjust:
          shift: [-9, 0]
        params:
          side: B
          text: RESET
          justify: left

      power_slider:
        what: trislider
        where: power
        params:
          side: B
          posts: true
          vias: true
          COM: RAW
          A: BAT+

      power_label:
        what: text
        where: power
        adjust.shift: [-4.5, 0.6]
        params:
          side: B
          text: POWER
          justify: right

      power_on:
        what: text
        where: power
        adjust.shift: [-4.5, -0.8]
        params:
          side: B
          text: ON
          justify: right

      power_off:
        what: text
        where: power
        adjust.shift: [4.5, 0.6]
        params:
          side: B
          text: OFF
          justify: left

      mounting_holes:
        what: mountinghole
        where: screw

      screw_holes:
        what: screwhole
        where: top_screw

      board_logo:
        what: p-gigas
        where: dpad
        adjust.shift: [0, 30]
        params:
          side: F

      keyboard_genus:
        what: text
        where: dpad
        adjust.shift: [0, -17]
        params:
          side: F
          text: *keyboard_genus
          layer: Cu
          size: 3
          thickness: 0.5

      keyboard_species:
        what: text
        where: dpad
        adjust.shift: [0, -22]
        params:
          side: F
          text: *keyboard_species
          layer: Cu
          size: 3
          thickness: 0.5

      board_version:
        what: text
        where: dpad
        adjust.shift: [0, -35]
        params:
          text: *version
          side: F

      board_repo:
        what: text
        where: dpad
        adjust.shift: [0, -33]
        params:
          side: F
          text: *repo

      license_note_over:
        what: text
        where: mcu
        adjust.shift: [-20, 8]
        params:
          side: F
          text: Licensed under

      license_note_under:
        what: text
        where: mcu
        adjust.shift: [-20, -6.5]
        params:
          side: F
          text: *license

      license_logo:
        what: oshw
        where: mcu
        adjust.shift: [-20, 1]
        params:
          side: F

      order_number:
        what: text
        where: dpad
        adjust.shift: [0, hdy - 2.75]
        params:
          side: F
          text: *order_text
