      radius: 1.2

  _rect_countersink1:
    - what: outline
      name: _rect_screw_shaft
      expand: 1

  _rect_countersink2:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.8

  _rect_countersink3:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.6

  _rect_countersink4:
    - what: outline
      name: _rect_screw_shaft
      expand: 0.4

  _rect_countersink5:
